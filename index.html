<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Portal</title>
    <link rel="stylesheet" href="css/style.css">
<script src="js/script.js" defer></script>

</head>
<body>

<header class="navbar">
  <div class="nav-container">
    <h1 class="logo">Job<span>Hub</span></h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="jobs.html">Jobs</a>
      <a href="post-job.html">Post Job</a>
      <a href="login.html" class="btn">Login</a>
    </nav>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <h2>Your <span>Dream Career</span> Starts Here</h2>
  <p>Search thousands of jobs from top companies across India</p>

  <div class="search-box">
    <input type="text" placeholder="Job title or keyword">
    <input type="text" placeholder="Location">
    <button>Search Jobs</button>
  </div>
</section>

<!-- STATS -->
<section class="stats">
  <div class="stat-card">
    <h3>10,000+</h3>
    <p>Jobs Posted</p>
  </div>
  <div class="stat-card">
    <h3>2,500+</h3>
    <p>Companies</p>
  </div>
  <div class="stat-card">
    <h3>50,000+</h3>
    <p>Candidates</p>
  </div>
</section>

<!-- CATEGORIES -->
<section class="categories">
  <h2>Popular Categories</h2>

  <div class="category-grid">
    <div class="category-card">💻 IT & Software</div>
    <div class="category-card">🎨 Design</div>
    <div class="category-card">📊 Data & Analytics</div>
    <div class="category-card">📢 Marketing</div>
    <div class="category-card">🧑‍💼 Management</div>
    <div class="category-card">🎓 Internships</div>
  </div>
</section>

</body>



</html>
